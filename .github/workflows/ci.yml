name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  format-check:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ruff
        run: pip install ruff==0.14.5

      - name: Install biome
        run: |
          curl -L https://github.com/biomejs/biome/releases/latest/download/biome-linux-x64 -o biome
          chmod +x biome
          sudo mv biome /usr/local/bin/

      - name: Check Python formatting
        run: ruff format --check .

      - name: Check Python linting
        run: ruff check .

      - name: Check JSON formatting
        run: biome format --diagnostic-level=error .

  test:
    name: Test index generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest -q
