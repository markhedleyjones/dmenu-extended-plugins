# Ruff configuration for dmenu-extended-plugins
# Matches git-hooks default config (Black-compatible)

# Line length: 88 (Black's default)
line-length = 88

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
]
ignore = []

[format]
quote-style = "double"
indent-style = "space"
